<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Avaliação de Algoritmos - 2º Ano</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #eef2f3; text-align: center; padding: 20px; }
        .container { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 24px; }
        #grid { 
            display: grid; grid-template-columns: repeat(5, 50px); grid-template-rows: repeat(5, 50px); 
            gap: 5px; background-color: #34495e; padding: 10px; border-radius: 10px; margin: 20px auto; width: 270px;
        }
        .cell { width: 50px; height: 50px; background-color: #ecf0f1; display: flex; align-items: center; justify-content: center; font-size: 25px; border-radius: 5px; }
        .controls button { padding: 12px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; transition: 0.2s; }
        .btn-move { background-color: #3498db; color: white; }
        .btn-run { background-color: #27ae60; color: white; width: 80%; font-weight: bold; }
        .btn-reset { background-color: #e74c3c; color: white; }
        #sequence { background: #f8f9fa; border: 1px dashed #ccc; padding: 10px; min-height: 40px; margin: 15px 0; border-radius: 8px; font-size: 20px; }
        #result-card { display: none; margin-top: 20px; padding: 20px; border-radius: 10px; border: 2px solid #27ae60; background-color: #f0fff4; }
        .score { font-size: 40px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Avaliação: Missão Algoritmo</h1>
    <p>Crie uma sequência de comandos para o 🤖 chegar até a 🍎.</p>
    
    <div id="grid"></div>

    <div id="sequence">Seu Algoritmo: </div>

    <div class="controls">
        <button class="btn-move" onclick="addStep('⬆️')">⬆️</button>
        <button class="btn-move" onclick="addStep('⬇️')">⬇️</button>
        <button class="btn-move" onclick="addStep('⬅️')">⬅️</button>
        <button class="btn-move" onclick="addStep('➡️')">➡️</button>
        <br>
        <button class="btn-run" onclick="runAlgorithm()">▶️ TESTAR ALGORITMO</button>
        <button class="btn-reset" onclick="resetGame()">🔄 Limpar</button>
    </div>

    <div id="result-card">
        <h2>Resultado Final</h2>
        <p>Tentativas: <span id="tries-display">0</span></p>
        <div class="score" id="final-score">0</div>
        <p id="feedback-msg"></p>
        <button onclick="location.reload()">Refazer Teste</button>
    </div>
</div>

<script>
    const size = 5;
    let robotPos = { x: 0, y: 0 };
    let goalPos = { x: 3, y: 3 }; // Alvo fixo para avaliação
    let steps = [];
    let tries = 0;
    let finished = false;

    function createGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (x === robotPos.x && y === robotPos.y) cell.innerText = '🤖';
                else if (x === goalPos.x && y === goalPos.y) cell.innerText = '🍎';
                grid.appendChild(cell);
            }
        }
    }

    function addStep(dir) {
        if(finished) return;
        if (steps.length < 12) {
            steps.push(dir);
            document.getElementById('sequence').innerText = "Seu Algoritmo: " + steps.join(' ');
        }
    }

    async function runAlgorithm() {
        if(finished || steps.length === 0) return;
        
        tries++;
        let tempPos = { x: 0, y: 0 };
        
        for (let move of steps) {
            if (move === '⬆️' && tempPos.y > 0) tempPos.y--;
            else if (move === '⬇️' && tempPos.y < size - 1) tempPos.y++;
            else if (move === '⬅️' && tempPos.x > 0) tempPos.x--;
            else if (move === '➡️' && tempPos.x < size - 1) tempPos.x++;
            
            robotPos = { ...tempPos };
            createGrid();
            await new Promise(r => setTimeout(r, 400));
        }

        checkWin();
    }

    function checkWin() {
        if (robotPos.x === goalPos.x && robotPos.y === goalPos.y) {
            finished = true;
            calculateScore();
        } else {
            alert("O robô não chegou na maçã! Tente ajustar seu algoritmo.");
            robotPos = { x: 0, y: 0 };
            createGrid();
        }
    }

    function calculateScore() {
        let score = 0;
        let msg = "";

        if (tries === 1) { score = 10; msg = "Excelente! Domínio total dos algoritmos!"; }
        else if (tries === 2) { score = 8; msg = "Muito bom! Você corrigiu seu algoritmo."; }
        else if (tries === 3) { score = 6; msg = "Bom! Você conseguiu chegar ao objetivo."; }
        else { score = 5; msg = "Você chegou lá! Mas tente planejar melhor na próxima."; }

        document.getElementById('result-card').style.display = 'block';
        document.getElementById('final-score').innerText = "NOTA: " + score;
        document.getElementById('tries-display').innerText = tries;
        document.getElementById('feedback-msg').innerText = msg;
    }

    function resetGame() {
        if(finished) return;
        steps = [];
        robotPos = { x: 0, y: 0 };
        document.getElementById('sequence').innerText = "Seu Algoritmo: ";
        createGrid();
    }

    createGrid();
</script>

</body>
</html>
